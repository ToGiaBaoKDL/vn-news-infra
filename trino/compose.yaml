services:
  trino:
    image: ${TRINO_IMAGE:-trinodb/trino:latest}
    profiles: ["lakehouse"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
