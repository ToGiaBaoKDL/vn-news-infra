services:
  article-fetcher:
    image: ${VN_NEWS_IMAGE_REGISTRY:?set VN_NEWS_IMAGE_REGISTRY}/${VN_NEWS_IMAGE_NAMESPACE:?set VN_NEWS_IMAGE_NAMESPACE}/vn-news-article-fetcher:${VN_NEWS_IMAGE_TAG:?set VN_NEWS_IMAGE_TAG}
    restart: unless-stopped
    environment: &worker-env
      AWS_SHARED_CREDENTIALS_FILE: /run/secrets/ingestion-s3-credentials
      VN_NEWS_CONFIG_DIR: /app/configs
      VN_NEWS_REDPANDA_BOOTSTRAP_SERVERS: ${VN_NEWS_REDPANDA_BOOTSTRAP_SERVERS:?set VN_NEWS_REDPANDA_BOOTSTRAP_SERVERS}
      VN_NEWS_SCHEMA_REGISTRY_URL: ${VN_NEWS_SCHEMA_REGISTRY_URL:?set VN_NEWS_SCHEMA_REGISTRY_URL}
      VN_NEWS_STORAGE_ENDPOINT_URL: ${VN_NEWS_STORAGE_ENDPOINT_URL:?set VN_NEWS_STORAGE_ENDPOINT_URL}
    secrets:
      - ingestion-s3-credentials
    volumes:
      - ${VN_NEWS_CONFIG_HOST_DIR:?set VN_NEWS_CONFIG_HOST_DIR}:/app/configs:ro
    healthcheck:
      test: ["CMD", "python", "-m", "news_service_common.health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  article-extractor:
    image: ${VN_NEWS_IMAGE_REGISTRY:?set VN_NEWS_IMAGE_REGISTRY}/${VN_NEWS_IMAGE_NAMESPACE:?set VN_NEWS_IMAGE_NAMESPACE}/vn-news-article-extractor:${VN_NEWS_IMAGE_TAG:?set VN_NEWS_IMAGE_TAG}
    restart: unless-stopped
    environment: *worker-env
    secrets:
      - ingestion-s3-credentials
    volumes:
      - ${VN_NEWS_CONFIG_HOST_DIR:?set VN_NEWS_CONFIG_HOST_DIR}:/app/configs:ro
    healthcheck:
      test: ["CMD", "python", "-m", "news_service_common.health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

secrets:
  ingestion-s3-credentials:
    file: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}/ingestion-s3-credentials
