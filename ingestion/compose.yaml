services:
  article-fetcher:
    image: ${ARTICLE_FETCHER_IMAGE:-docker.io/toilachuoituyet/vn-news-article-fetcher:0.1.0}
    profiles: ["ingestion"]
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      seaweedfs-s3:
        condition: service_healthy
    volumes:
      - ../../vn-news-config/configs:/app/configs:ro
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  article-extractor:
    image: ${ARTICLE_EXTRACTOR_IMAGE:-docker.io/toilachuoituyet/vn-news-article-extractor:0.1.0}
    profiles: ["ingestion"]
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      seaweedfs-s3:
        condition: service_healthy
    volumes:
      - ../../vn-news-config/configs:/app/configs:ro
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
