name: Publish Images

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-images.yaml"
      - "airflow/runtime/**"
      - "images.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out infra
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: vn-news-infra
          fetch-depth: 0

      - name: Check out platform library
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ github.repository_owner }}/vn-news-platform-lib
          token: ${{ secrets.WORKSPACE_READ_TOKEN || github.token }}
          ref: main
          path: vn-news-platform-lib

      - name: Check out CI/CD tooling
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ github.repository_owner }}/vn-news-cicd
          token: ${{ secrets.WORKSPACE_READ_TOKEN || github.token }}
          ref: main
          path: vn-news-cicd

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.17"
          python-version: "3.12"
          working-directory: vn-news-cicd

      - name: Resolve changed images
        id: images
        working-directory: vn-news-cicd
        run: |
          set -euo pipefail
          uv sync --frozen --no-dev
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            image_output="$(uv run --no-dev python -m scripts.images.changed \
              --catalog ../vn-news-infra/images.yaml \
              --build-all \
              --format shell)"
          else
            image_output="$(uv run --no-dev python -m scripts.images.changed \
              --catalog ../vn-news-infra/images.yaml \
              --repo-root ../vn-news-infra \
              --base-ref "${{ github.event.before }}" \
              --head-ref "${{ github.sha }}" \
              --format shell)"
          fi
          printf '%s\n' "$image_output" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$image_output"

      - name: Set up Docker Buildx
        if: steps.images.outputs.has_changes == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Docker Hub
        if: steps.images.outputs.has_changes == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve publish image tag
        if: steps.images.outputs.has_changes == 'true'
        id: image
        working-directory: vn-news-infra
        run: |
          set -euo pipefail
          infra_ref="$(git rev-parse --short=12 HEAD)"
          echo "tag=sha-${infra_ref}" >> "$GITHUB_OUTPUT"

      - name: Build and push images
        if: steps.images.outputs.has_changes == 'true'
        working-directory: vn-news-cicd
        env:
          PUBLISH_IMAGE_TAG: ${{ steps.image.outputs.tag }}
          VN_NEWS_IMAGE_REGISTRY: docker.io
          VN_NEWS_IMAGE_NAMESPACE: ${{ vars.VN_NEWS_IMAGE_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          : "${VN_NEWS_IMAGE_NAMESPACE:?Set VN_NEWS_IMAGE_NAMESPACE or DOCKERHUB_USERNAME}"
          uv run --no-dev python -m scripts.images.build \
            --catalog ../vn-news-infra/images.yaml \
            --workspace-root .. \
            ${{ steps.images.outputs.image_args }} \
            --tag "$PUBLISH_IMAGE_TAG" \
            --push

      - name: Resolve image digest manifest
        if: steps.images.outputs.has_changes == 'true'
        working-directory: vn-news-cicd
        env:
          PUBLISH_IMAGE_TAG: ${{ steps.image.outputs.tag }}
          VN_NEWS_IMAGE_REGISTRY: docker.io
          VN_NEWS_IMAGE_NAMESPACE: ${{ vars.VN_NEWS_IMAGE_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          image_manifest="$(uv run --no-dev python -m scripts.images.digests \
            --catalog ../vn-news-infra/images.yaml \
            ${{ steps.images.outputs.image_args }} \
            --tag "$PUBLISH_IMAGE_TAG")"
          install -d image-manifest
          printf '%s\n' "$image_manifest" > image-manifest/image-manifest.json
          printf '### Image digest manifest\n\n```json\n%s\n```\n' "$image_manifest" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image digest manifest
        if: steps.images.outputs.has_changes == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: image-manifest
          path: vn-news-cicd/image-manifest/image-manifest.json
          if-no-files-found: error
          retention-days: 30

      - name: Report skipped publish
        if: steps.images.outputs.has_changes != 'true'
        run: echo "No infra image changes detected."
