name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out infra
        uses: actions/checkout@v6

      - name: Validate Compose
        run: |
          docker compose --env-file .env.example -f compose.yaml config --quiet
          docker compose --env-file .env.workers.example -f compose.workers.yaml config --quiet
