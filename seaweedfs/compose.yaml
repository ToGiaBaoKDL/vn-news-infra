services:
  seaweedfs-s3:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:4.29}
    restart: unless-stopped
    command: server -s3 -s3.config=/run/secrets/seaweedfs-s3-config -dir=/data
    ports:
      - "${VN_NEWS_DATA_PRIVATE_IP:?set VN_NEWS_DATA_PRIVATE_IP}:8333:8333"
      - "${VN_NEWS_ADMIN_BIND_ADDRESS:-127.0.0.1}:9333:9333"
      - "${VN_NEWS_ADMIN_BIND_ADDRESS:-127.0.0.1}:8888:8888"
    secrets:
      - seaweedfs-s3-config
    volumes:
      - ${VN_NEWS_DATA_ROOT:?set VN_NEWS_DATA_ROOT}/seaweedfs:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9333/cluster/status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

secrets:
  seaweedfs-s3-config:
    file: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}/seaweedfs-s3.json
