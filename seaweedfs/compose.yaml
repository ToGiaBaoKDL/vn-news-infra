services:
  seaweedfs-s3:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:4.29}
    restart: unless-stopped
    command: server -s3 -s3.config=/etc/seaweedfs/s3.json -dir=/data
    ports:
      - "${PLATFORM_PRIVATE_IP:?set PLATFORM_PRIVATE_IP}:8333:8333"
      - "${ADMIN_BIND_ADDRESS:-127.0.0.1}:9333:9333"
      - "${ADMIN_BIND_ADDRESS:-127.0.0.1}:8888:8888"
    volumes:
      - ${SEAWEEDFS_S3_CONFIG_HOST_FILE:?set SEAWEEDFS_S3_CONFIG_HOST_FILE}:/etc/seaweedfs/s3.json:ro
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9333/cluster/status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  seaweedfs-data:
