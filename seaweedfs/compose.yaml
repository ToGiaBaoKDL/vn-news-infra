services:
  seaweedfs-s3:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:4.29}
    command: mini -dir=/data
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?set AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY}
    ports:
      - "${PLATFORM_PRIVATE_IP:?set PLATFORM_PRIVATE_IP}:8333:8333"
      - "${ADMIN_BIND_ADDRESS:-127.0.0.1}:9333:9333"
      - "${ADMIN_BIND_ADDRESS:-127.0.0.1}:8888:8888"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9333/cluster/status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  seaweedfs-data:
