x-polaris-jdbc-env: &polaris-jdbc-env
  POLARIS_PERSISTENCE_TYPE: relational-jdbc
  QUARKUS_CONFIG_LOCATIONS: file:/run/secrets/polaris-application.properties
  QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://polaris-db:5432/${VN_NEWS_POLARIS_DB_NAME:-POLARIS}
  QUARKUS_DATASOURCE_USERNAME: ${VN_NEWS_POLARIS_DB_USER:-polaris}

x-polaris-application-secret: &polaris-application-secret
  source: polaris-application-properties
  target: polaris-application.properties

services:
  polaris-db:
    image: ${POLARIS_DB_IMAGE:-postgres:18.3}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VN_NEWS_POLARIS_DB_NAME:-POLARIS}
      POSTGRES_INITDB_ARGS: "--encoding UTF8 --data-checksums"
      POSTGRES_PASSWORD_FILE: /run/secrets/polaris-db-password
      POSTGRES_USER: ${VN_NEWS_POLARIS_DB_USER:-polaris}
    secrets:
      - polaris-db-password
    volumes:
      - ${VN_NEWS_DATA_ROOT:?set VN_NEWS_DATA_ROOT}/polaris-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  polaris-bootstrap:
    image: ${POLARIS_ADMIN_TOOL_IMAGE:-apache/polaris-admin-tool:1.5.0}
    profiles: ["bootstrap"]
    depends_on:
      polaris-db:
        condition: service_healthy
    environment:
      <<: *polaris-jdbc-env
    command:
      - bootstrap
      - --credentials-file=/run/secrets/polaris-bootstrap-credentials.json
    secrets:
      - *polaris-application-secret
      - source: polaris-bootstrap-credentials
        target: polaris-bootstrap-credentials.json
    restart: "no"

  polaris:
    image: ${POLARIS_IMAGE:-apache/polaris:1.5.0}
    restart: unless-stopped
    depends_on:
      polaris-db:
        condition: service_healthy
    environment:
      <<: *polaris-jdbc-env
      AWS_SHARED_CREDENTIALS_FILE: /run/secrets/storage-admin-s3-credentials
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_INITIAL_DELAY_IN_MS: "100"
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_DURATION_IN_MS: "5000"
      POLARIS_PERSISTENCE_RELATIONAL_JDBC_MAX_RETRIES: "5"
      POLARIS_REALM_CONTEXT_REALMS: ${VN_NEWS_POLARIS_REALM:-POLARIS}
      QUARKUS_OTEL_SDK_DISABLED: "true"
      polaris.features."SUPPORTED_CATALOG_STORAGE_TYPES": '["S3"]'
    secrets:
      - *polaris-application-secret
      - source: storage-admin-s3-credentials
        target: storage-admin-s3-credentials
    ports:
      - "${VN_NEWS_DATA_PRIVATE_IP:?set VN_NEWS_DATA_PRIVATE_IP}:18181:8181"
      - "${VN_NEWS_ADMIN_BIND_ADDRESS:-127.0.0.1}:18182:8182"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

secrets:
  polaris-db-password:
    file: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}/polaris-db-password
  polaris-application-properties:
    file: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}/polaris-application.properties
  polaris-bootstrap-credentials:
    file: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}/polaris-bootstrap-credentials.json
  storage-admin-s3-credentials:
    file: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}/storage-admin-s3-credentials
