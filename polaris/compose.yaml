services:
  polaris:
    image: ${POLARIS_IMAGE:-apache/polaris:latest}
    profiles: ["lakehouse"]
    ports:
      - "8181:8181"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8181/q/health/ready >/dev/null || curl -fsS http://localhost:8181/healthcheck >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
