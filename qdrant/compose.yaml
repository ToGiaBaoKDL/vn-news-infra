services:
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    profiles: ["serving"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': >/dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  qdrant-data:
