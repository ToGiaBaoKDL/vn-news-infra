x-airflow-env: &airflow-env
  AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET:?set AIRFLOW_API_AUTH_JWT_SECRET}
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Ho_Chi_Minh
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "2"
  AIRFLOW__CORE__PARALLELISM: "8"
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "false"
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_SIMPLE_AUTH_MANAGER_USERS:?set AIRFLOW_SIMPLE_AUTH_MANAGER_USERS}
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:?set AIRFLOW_DB_PASSWORD}@airflow-db/airflow
  AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
  VN_NEWS_CONFIG_DIR: /opt/vn-news/configs

x-rss-task-env: &rss-task-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?set AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY}
  VN_NEWS_CONFIG_HOST_DIR: ${VN_NEWS_CONFIG_HOST_DIR:?set VN_NEWS_CONFIG_HOST_DIR}
  VN_NEWS_DOCKER_URL: tcp://docker-socket-proxy:2375
  VN_NEWS_FEED_INGESTOR_IMAGE: docker.io/toilachuoituyet/vn-news-feed-ingestor:${VN_NEWS_RELEASE_TAG:?set VN_NEWS_RELEASE_TAG}
  VN_NEWS_REDPANDA_BOOTSTRAP_SERVERS: ${VN_NEWS_REDPANDA_BOOTSTRAP_SERVERS:?set VN_NEWS_REDPANDA_BOOTSTRAP_SERVERS}
  VN_NEWS_SCHEMA_REGISTRY_URL: ${VN_NEWS_SCHEMA_REGISTRY_URL:?set VN_NEWS_SCHEMA_REGISTRY_URL}
  VN_NEWS_STORAGE_ENDPOINT_URL: ${VN_NEWS_STORAGE_ENDPOINT_URL:?set VN_NEWS_STORAGE_ENDPOINT_URL}

x-airflow-common: &airflow-common
  image: docker.io/toilachuoituyet/vn-news-airflow:${VN_NEWS_RELEASE_TAG:?set VN_NEWS_RELEASE_TAG}
  depends_on:
    airflow-db:
      condition: service_healthy
  volumes:
    - ${VN_NEWS_CONFIG_HOST_DIR:?set VN_NEWS_CONFIG_HOST_DIR}:/opt/vn-news/configs:ro

services:
  airflow-db:
    image: ${AIRFLOW_DB_IMAGE:-postgres:16.9}
    restart: unless-stopped
    environment:
      POSTGRES_DB: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:?set AIRFLOW_DB_PASSWORD}
      POSTGRES_USER: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  docker-socket-proxy:
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy:v0.4.2}
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      IMAGES: "1"
      POST: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:2375/_ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: unless-stopped
    depends_on:
      airflow-api-server:
        condition: service_healthy
      airflow-db:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_healthy
    environment:
      <<: [*airflow-env, *rss-task-env]
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-dag-processor:
    <<: *airflow-common
    command: airflow dag-processor
    restart: unless-stopped
    environment:
      <<: [*airflow-env, *rss-task-env]
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-api-server:
    <<: *airflow-common
    command: airflow api-server
    restart: unless-stopped
    environment: *airflow-env
    ports:
      - "${ADMIN_BIND_ADDRESS:-127.0.0.1}:8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v2/monitor/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  airflow-db-data:
