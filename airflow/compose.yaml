x-airflow-env: &airflow-env
  AIRFLOW__API_AUTH__JWT_SECRET_CMD: cat /run/secrets/airflow-api-jwt-secret
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/empty-dags
  AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Ho_Chi_Minh
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__FERNET_KEY_CMD: cat /run/secrets/airflow-fernet-key
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "1"
  AIRFLOW__CORE__PARALLELISM: "4"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_CMD: "bash -c 'printf \"postgresql+psycopg2://airflow:\"; tr -d \"\\n\\r\" < /run/secrets/airflow-db-password; printf \"@airflow-db/airflow\"'"
  AIRFLOW__DAG_PROCESSOR__BUNDLE_REFRESH_CHECK_INTERVAL: "5"
  AIRFLOW__DAG_PROCESSOR__DAG_BUNDLE_CONFIG_LIST: >-
    [
      {
        "name": "vn-news-orchestration",
        "classpath": "airflow.providers.git.bundles.git.GitDagBundle",
        "kwargs": {
          "repo_url": "${VN_NEWS_ORCHESTRATION_GIT_URL:?set VN_NEWS_ORCHESTRATION_GIT_URL}",
          "tracking_ref": "${VN_NEWS_ORCHESTRATION_GIT_REF:?set VN_NEWS_ORCHESTRATION_GIT_REF}",
          "refresh_interval": 60,
          "submodules": false,
          "prune_dotgit_folder": true
        }
      }
    ]
  AIRFLOW__DAG_PROCESSOR__DAG_BUNDLE_STORAGE_PATH: /opt/airflow/dag-bundles
  AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
  VN_NEWS_CONFIG_DIR: /opt/vn-news/configs

x-rss-task-env: &rss-task-env
  VN_NEWS_SECRETS_HOST_DIR: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}
  VN_NEWS_CONFIG_HOST_DIR: ${VN_NEWS_CONFIG_HOST_DIR:?set VN_NEWS_CONFIG_HOST_DIR}
  VN_NEWS_DOCKER_URL: ${VN_NEWS_DOCKER_URL:?set VN_NEWS_DOCKER_URL}
  VN_NEWS_FEED_INGESTOR_IMAGE: docker.io/toilachuoituyet/vn-news-feed-ingestor:${VN_NEWS_RELEASE_TAG:?set VN_NEWS_RELEASE_TAG}
  VN_NEWS_REDPANDA_BOOTSTRAP_SERVERS: ${VN_NEWS_REDPANDA_BOOTSTRAP_SERVERS:?set VN_NEWS_REDPANDA_BOOTSTRAP_SERVERS}
  VN_NEWS_SCHEMA_REGISTRY_URL: ${VN_NEWS_SCHEMA_REGISTRY_URL:?set VN_NEWS_SCHEMA_REGISTRY_URL}
  VN_NEWS_STORAGE_ENDPOINT_URL: ${VN_NEWS_STORAGE_ENDPOINT_URL:?set VN_NEWS_STORAGE_ENDPOINT_URL}

x-airflow-common: &airflow-common
  image: docker.io/toilachuoituyet/vn-news-airflow-runtime:${VN_NEWS_RELEASE_TAG:?set VN_NEWS_RELEASE_TAG}
  depends_on:
    airflow-db:
      condition: service_healthy
  volumes:
    - ${VN_NEWS_CONFIG_HOST_DIR:?set VN_NEWS_CONFIG_HOST_DIR}:/opt/vn-news/configs:ro
    - ${VN_NEWS_AIRFLOW_LOGS_DIR:-/srv/vn-news-control/airflow-logs}:/opt/airflow/logs
    - ${VN_NEWS_AIRFLOW_DAG_BUNDLES_DIR:-/srv/vn-news-control/airflow-dag-bundles}:/opt/airflow/dag-bundles

x-airflow-secrets: &airflow-secrets
  - airflow-db-password
  - airflow-api-jwt-secret
  - airflow-fernet-key

x-airflow-bootstrap-secrets: &airflow-bootstrap-secrets
  - airflow-db-password
  - airflow-api-jwt-secret
  - airflow-fernet-key
  - airflow-admin-password

services:
  airflow-db:
    image: ${AIRFLOW_DB_IMAGE:-postgres:16.9}
    restart: unless-stopped
    environment:
      POSTGRES_DB: airflow
      POSTGRES_PASSWORD_FILE: /run/secrets/airflow-db-password
      POSTGRES_USER: airflow
    secrets:
      - airflow-db-password
    volumes:
      - ${VN_NEWS_AIRFLOW_DB_DIR:-/srv/vn-news-control/airflow-db}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  airflow-bootstrap:
    <<: *airflow-common
    profiles: ["bootstrap"]
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        airflow db migrate
        if airflow users list | grep -Fq "${VN_NEWS_AIRFLOW_ADMIN_USERNAME:-tgb_admin}"; then
          echo "Airflow admin user exists: ${VN_NEWS_AIRFLOW_ADMIN_USERNAME:-tgb_admin}"
          exit 0
        fi
        airflow users create \
          --username "${VN_NEWS_AIRFLOW_ADMIN_USERNAME:-tgb_admin}" \
          --firstname VN \
          --lastname News \
          --role Admin \
          --email "${VN_NEWS_AIRFLOW_ADMIN_EMAIL:-admin@vn-news.local}" \
          --password "$(tr -d '\n\r' < /run/secrets/airflow-admin-password)"
    restart: "no"
    environment:
      <<: *airflow-env
      VN_NEWS_AIRFLOW_ADMIN_EMAIL: ${VN_NEWS_AIRFLOW_ADMIN_EMAIL:-admin@vn-news.local}
      VN_NEWS_AIRFLOW_ADMIN_USERNAME: ${VN_NEWS_AIRFLOW_ADMIN_USERNAME:-tgb_admin}
    secrets: *airflow-bootstrap-secrets

  docker-socket-proxy:
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy:v0.4.2}
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      IMAGES: "1"
      POST: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:2375/_ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: unless-stopped
    depends_on:
      airflow-api-server:
        condition: service_healthy
      airflow-db:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_healthy
    environment:
      <<: [*airflow-env, *rss-task-env]
    secrets: *airflow-secrets
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-dag-processor:
    <<: *airflow-common
    command: airflow dag-processor
    restart: unless-stopped
    environment:
      <<: [*airflow-env, *rss-task-env]
    secrets: *airflow-secrets
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-api-server:
    <<: *airflow-common
    command: airflow api-server
    restart: unless-stopped
    environment: *airflow-env
    secrets: *airflow-secrets
    ports:
      - "${VN_NEWS_ADMIN_BIND_ADDRESS:-127.0.0.1}:8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v2/monitor/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

secrets:
  airflow-db-password:
    file: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}/airflow-db-password
  airflow-api-jwt-secret:
    file: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}/airflow-api-jwt-secret
  airflow-fernet-key:
    file: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}/airflow-fernet-key
  airflow-admin-password:
    file: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}/airflow-admin-password
