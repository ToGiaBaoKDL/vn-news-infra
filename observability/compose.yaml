services:
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    profiles: ["observability"]
    command: --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana-oss:latest}
    profiles: ["observability"]
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:latest}
    profiles: ["observability"]
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    volumes:
      - ./otel/collector.yaml:/etc/otelcol/config.yaml:ro
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otelcol/config.yaml"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  prometheus-data:
  grafana-data:
