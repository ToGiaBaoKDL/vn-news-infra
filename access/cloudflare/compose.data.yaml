services:
  cloudflared-data:
    image: ${VN_NEWS_CLOUDFLARED_IMAGE:-cloudflare/cloudflared:2026.5.2}
    network_mode: host
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - --metrics
      - 127.0.0.1:2000
      - run
      - --token-file
      - /run/vn-news/secrets/cloudflare-data-tunnel-token
    volumes:
      - type: bind
        source: ${VN_NEWS_SECRETS_HOST_DIR:-/run/vn-news/secrets}/cloudflare-data-tunnel-token
        target: /run/vn-news/secrets/cloudflare-data-tunnel-token
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
